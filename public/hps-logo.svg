<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="innerClip">
      <circle cx="100" cy="100" r="78"/>
    </clipPath>
    <path id="topArc" d="M 17,90 A 86,86 0 0,1 183,90"/>
    <path id="botArc" d="M 180,113 A 86,86 0 0,1 20,113"/>
  </defs>

  <!-- Outer dark blue fill -->
  <circle cx="100" cy="100" r="100" fill="#1B35A8"/>

  <!-- Cyan outer ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#00CCEE" stroke-width="4"/>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="78" fill="#EAF6FF"/>

  <!-- Blue upper half -->
  <rect x="0" y="0" width="200" height="107" fill="#1B35A8" clip-path="url(#innerClip)"/>

  <!-- Divider line -->
  <line x1="22" y1="107" x2="178" y2="107" stroke="#00CCEE" stroke-width="1.5"/>

  <!-- Inner cyan ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#00CCEE" stroke-width="2"/>

  <!-- ORBITAL RING (tilted ellipse, behind book) -->
  <ellipse cx="100" cy="76" rx="44" ry="13" fill="none" stroke="#00CCEE" stroke-width="3"
    transform="rotate(-22 100 76)"/>

  <!-- OPEN BOOK (centered at 100,88) -->
  <!-- Left page -->
  <path d="M 68,100 Q 84,82 100,86 L 100,66 Q 84,64 68,74 Z" fill="#0F2070"/>
  <!-- Right page -->
  <path d="M 132,100 Q 116,82 100,86 L 100,66 Q 116,64 132,74 Z" fill="#0F2070"/>
  <!-- Bottom curve of book -->
  <path d="M 68,100 Q 100,104 132,100" fill="none" stroke="#0F2070" stroke-width="2"/>
  <!-- Spine line -->
  <line x1="100" y1="66" x2="100" y2="100" stroke="#00CCEE" stroke-width="1"/>
  <!-- Page lines left -->
  <line x1="76" y1="80" x2="96" y2="79" stroke="#2848A8" stroke-width="0.7"/>
  <line x1="76" y1="85" x2="96" y2="84" stroke="#2848A8" stroke-width="0.7"/>
  <line x1="76" y1="90" x2="96" y2="90" stroke="#2848A8" stroke-width="0.7"/>
  <!-- Page lines right -->
  <line x1="124" y1="80" x2="104" y2="79" stroke="#2848A8" stroke-width="0.7"/>
  <line x1="124" y1="85" x2="104" y2="84" stroke="#2848A8" stroke-width="0.7"/>
  <line x1="124" y1="90" x2="104" y2="90" stroke="#2848A8" stroke-width="0.7"/>

  <!-- Tagline in white area -->
  <text x="100" y="120" text-anchor="middle" fill="#0099BB" font-size="9.5"
    font-style="italic" font-family="Georgia, 'Times New Roman', serif">giving our students</text>
  <text x="100" y="132" text-anchor="middle" fill="#0099BB" font-size="9.5"
    font-style="italic" font-family="Georgia, 'Times New Roman', serif">the world</text>

  <!-- Top curved text "HPS ACADEMY" -->
  <text font-size="13" font-weight="bold" fill="white" letter-spacing="2.5"
    font-family="Arial Black, Arial, sans-serif">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">HPS ACADEMY</textPath>
  </text>

  <!-- Bottom curved text "RAHARA" -->
  <text font-size="13" font-weight="bold" fill="white" letter-spacing="3.5"
    font-family="Arial Black, Arial, sans-serif">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">RAHARA</textPath>
  </text>
</svg>
